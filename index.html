<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Torrent Player Addon</title>
</head>
<body>
    <script>
        // Questa funzione verrà chiamata da Eclipse Music quando l'utente cerca
        window.EclipseAddon = {
            async search(query) {
                const backendUrl = "https://eclipsemusicaddonto.vercel.app";
                
                // 1. Avvia la ricerca
                const searchResp = await fetch(`${backendUrl}/search?q=${encodeURIComponent(query)}`);
                if (!searchResp.ok) {
                    const err = await searchResp.json();
                    throw new Error(err.detail || "Errore nella ricerca");
                }
                const searchData = await searchResp.json();
                const torrentId = searchData.torrent_id;
                
                // 2. Polling su /status
                return new Promise((resolve, reject) => {
                    const maxAttempts = 60;  // 2 minuti (2 sec * 60)
                    let attempts = 0;
                    
                    const poll = setInterval(async () => {
                        attempts++;
                        try {
                            const statusResp = await fetch(`${backendUrl}/status?torrent_id=${torrentId}`);
                            const statusData = await statusResp.json();
                            
                            if (statusData.status === "ready") {
                                clearInterval(poll);
                                resolve(statusData.stream_url);
                            } else if (statusData.status === "pending") {
                                // ancora in download
                                if (attempts >= maxAttempts) {
                                    clearInterval(poll);
                                    reject(new Error("Timeout: il download richiede troppo tempo"));
                                }
                                // altrimenti continua
                            } else {
                                clearInterval(poll);
                                reject(new Error("Stato sconosciuto: " + statusData.state));
                            }
                        } catch (err) {
                            clearInterval(poll);
                            reject(err);
                        }
                    }, 2000); // ogni 2 secondi
                });
            }
        };
        
        // Esponi l'addon a Eclipse (metodo standard)
        if (typeof Eclipse !== "undefined") {
            Eclipse.registerAddon(window.EclipseAddon);
        }
    </script>
</body>
</html>
